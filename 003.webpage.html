<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        nav{
            width: 100%;
            height: 10vh;
            background-color: rgb(166, 0, 255 );
            display: flex;
            /*justify-content: space-between;*/
            align-items: center;
        }
        nav div{
            font-size: 20px;
            color: white;
            
        }
        .menu{
            display: flex;
            justify-content: space-evenly;
            width: 70%;
        }
        .search{
            width: 200px;
            height: 27px;
            position: relative;
        }
        i{
            font-size: 20px;
            right: 10px;
            top: 4px;
            position: absolute;
            color: black;
        }
        .search input{
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            font-size: 15px;
            padding-right: 35px;
            padding-left: 5px;
            background-color: transparent;
            border-bottom: 2px solid black;
            border-right: 2px solid black;
            outline: none;
        }
        ::placeholder{
            font-size: 15px;
            color: white;
            padding: 3px;
        }
        .logo,.ppic{
            width: 55px;
            height: 55px;
           /* padding-top: 5px;*/
            
            
        }
        nav img{
            width: 100%;
            height: 100%;
            
        }
        .bnr{
            width: 100%;
            height: 90vh;
            background: linear-gradient(rgba(120,57,210,0.7),rgba(200,125,50,0.6)),url(image1.jpg);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bnrcont{
            width: 40%;
            border: 2px solid rgb(0, 58, 128);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 30px;
            gap: 8px;
        }
        .bnrcont h1{
            font-size: 28px;
            color: rgb(205, 43, 226);
        }
        .bnrcont p{
            font-size: 20px;
            color: rgb(43, 174, 226) ;
            text-indent: 40px;
            text-align: justify;
        }
        .bnrcont button{
            padding: 10px 30px;
            font-size: 17px;
            background: transparent;
            color: white;
        }
        .cardcon{
            width: 100%;
            background-color: brown;
            display: flex;
            flex-wrap: wrap;                /*Flex items will wrap onto multiple lines if necessary. Items will break 
                                                into a new line if they don’t fit into the container.*/
            justify-content: space-evenly;
            gap: 10px;
            padding: 30px 0px;
        }
        .card{
            width: 35%;
            height: 200px;
            border: 2px solid black;
        }
        .cardcon img{
            width: 100%;
            height: 100%;
        }
        footer{
            width: 100%;
            background-color: burlywood;
            font-size: 15px;
            font-style: italic;
            text-align: center;
            line-height: 35px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="./messenger-icon.png" alt="">
        </div>
        
        <div class="menu"> 
            <div>Login</div>
            <div>About</div>
            <div>Home</div>
            <div>Register</div>
            <div>ContactUS</div>
        </div>

        <div class="search">
            <input type="text" placeholder="Enter data to Search" />
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="ppic">
            <img src="User_icon_2.svg.png" alt="">
        </div>
    </nav>

    <div class="bnr">
        <div class="bnrcont">
            <h1>Welcome to XYZ.com</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Perspiciatis saepe natus laboriosam alias molestias iste doloribus porro repellat nisi ducimus.</p>
            <button>Know More...</button>
        </div>
    </div>

    <div class="cardcon">
        <div class="card">
            <img src="image2.jpg" alt="">
        </div>
        <div class="card">
            <img src="image3.jpg" alt="">
        </div>
        <div class="card">
            <img src="image4.jpg" alt="">
        </div>
        <div class="card">
            <img src="image5.jpg" alt="">
        </div>
        <div class="card">
            <img src="image6.jpg" alt="">
        </div>
        <div class="card">
            <img src="image7.jpg" alt="">
        </div>
        <div class="card">
            <img src="image1.jpg" alt="">
        </div>
    </div>

    <footer>@copyright to xyz.com</footer>
</body>
</html>
